<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trially — AWS Architecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06041a;
      --border: rgba(124, 58, 237, 0.18);
      --accent: #c4b5fd;
      --text: #e2d9f3;
      --text-dim: #7a6a9a;
    }

    body {
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(124, 58, 237, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 58, 237, 0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 12px;
      padding: 13px 28px;
      background: rgba(6, 4, 26, 0.88);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px);
    }

    .logo {
      width: 30px; height: 30px; border-radius: 7px;
      background: linear-gradient(135deg, #7c3aed, #4f1da8);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0;
      box-shadow: 0 0 12px rgba(124,58,237,0.5);
    }
    .header-name { font-size: 17px; font-weight: 600; color: var(--accent); }
    .divider { width: 1px; height: 18px; background: rgba(124,58,237,0.25); margin: 0 4px; }
    .header-sub { font-size: 13px; color: var(--text-dim); }
    .stats { margin-left: auto; display: flex; gap: 10px; }
    .stat-chip {
      font-family: 'Fira Code', monospace; font-size: 11px;
      color: #a78bfa; background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.22); padding: 4px 11px; border-radius: 20px;
    }

    main { display: flex; gap: 20px; max-width: 1240px; margin: 0 auto; padding: 24px 18px 60px; }

    .diagram-wrap { flex: 1; min-width: 0; }
    .diagram-wrap svg {
      width: 100%; height: auto; display: block; border-radius: 12px;
      box-shadow: 0 0 0 1px rgba(124,58,237,0.15), 0 8px 40px rgba(0,0,0,0.5);
    }

    .info-panel { width: 240px; flex-shrink: 0; position: sticky; top: 80px; align-self: flex-start; }
    .info-card {
      background: rgba(13, 10, 36, 0.9); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; backdrop-filter: blur(10px);
    }
    .info-card .hint {
      font-size: 12px; color: var(--text-dim); text-align: center; padding: 20px 0; line-height: 1.6;
    }
    .info-card .hint svg { display: block; margin: 0 auto 10px; opacity: 0.4; }
    .node-info { display: none; }
    .node-info.active { display: block; }
    .ni-badge {
      display: inline-block; font-family: 'Fira Code', monospace;
      font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-bottom: 10px;
    }
    .ni-title { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 10px; line-height: 1.35; }
    .ni-divider { height: 1px; background: var(--border); margin: 10px 0; }
    .ni-row { display: flex; align-items: flex-start; gap: 7px; font-size: 12px; color: #9d8cc4; line-height: 1.55; margin-top: 5px; }
    .ni-row-icon { flex-shrink: 0; margin-top: 2px; opacity: 0.7; }
    .ni-hipaa {
      margin-top: 12px; font-family: 'Fira Code', monospace; font-size: 10px;
      color: #f87171; background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3); border-radius: 5px;
      padding: 6px 8px; line-height: 1.5;
    }

    .node { cursor: pointer; }
    .node rect { transition: filter 0.18s ease; }
    .node:hover rect { filter: brightness(1.45) saturate(1.3); }
    .node text { pointer-events: none; user-select: none; }

    @media (max-width: 900px) {
      main { flex-direction: column; }
      .info-panel { width: 100%; position: static; }
      .stats { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Tr</div>
  <span class="header-name">Trially</span>
  <div class="divider"></div>
  <span class="header-sub">AWS Architecture</span>
  <div class="stats">
    <span class="stat-chip">18 AWS services</span>
    <span class="stat-chip">9 Lambdas</span>
    <span class="stat-chip">5-step pipeline</span>
  </div>
</header>

<main>
  <div class="diagram-wrap">
    <!--
      Grid layout (all x/y/w/h in px, viewBox 0 0 1080 1110):

      Columns (center x):  109  |  305  |  505  |  714  |  935
      Col x-ranges:       20-198 | 213-398 | 405-605 | 615-813 | 835-1035

      Row tops: 42, 148, 258, 342, 452, 545, 640, 752, 848, 938 | Legend 1020
    -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1110">
      <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(124,58,237,0.06)" stroke-width="0.8"/>
        </pattern>

        <linearGradient id="gp" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#231252"/><stop offset="100%" stop-color="#160c38"/>
        </linearGradient>
        <linearGradient id="gb" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0f2244"/><stop offset="100%" stop-color="#091629"/>
        </linearGradient>
        <linearGradient id="go" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#35200f"/><stop offset="100%" stop-color="#201408"/>
        </linearGradient>
        <linearGradient id="gr" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#321010"/><stop offset="100%" stop-color="#1e0a0a"/>
        </linearGradient>
        <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0f3522"/><stop offset="100%" stop-color="#082015"/>
        </linearGradient>

        <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#7c5cbf"/>
        </marker>

        <style>
          svg text { font-family: 'Fira Code', 'Courier New', monospace; fill: #e2d9f3; }
          .t  { font-size: 11.5px; font-weight: bold; fill: #f0e6ff; }
          .n  { font-size: 10px; fill: #9d87cc; }
          .nr { font-size: 10px; fill: #f87171; }
          /* static edge */
          .e { stroke: #6040a8; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
          /* animated data-flow edge */
          .f {
            stroke: #7c5cbf; stroke-width: 1.5; fill: none;
            stroke-dasharray: 7 4; marker-end: url(#arr);
            animation: flowdash 1.8s linear infinite;
          }
          @keyframes flowdash { to { stroke-dashoffset: -33; } }
        </style>
      </defs>

      <!-- Background -->
      <rect width="1080" height="1110" fill="#07051c" rx="12"/>
      <rect width="1080" height="1110" fill="url(#grid)" rx="12"/>

      <text x="540" y="30" text-anchor="middle" font-size="15" font-weight="700"
            fill="#c4b5fd" font-family="'Exo 2',sans-serif" letter-spacing="2">
        TRIALLY — AWS ARCHITECTURE
      </text>

      <!-- ══════════════════════════════════════════
           ROW 1  y=42   External entry points
           Col1=20  Col3=405  Col5=835
      ══════════════════════════════════════════ -->

      <g class="node" id="n-elevenlabs"
         data-title="ElevenLabs" data-type="green"
         data-info="ConvAI agent supporting 30+ languages|Scribe v2 for speech-to-text transcription|Connected to browser via persistent WebSocket">
        <rect x="20"  y="42" width="178" height="60" rx="9" fill="url(#gg)" stroke="#22c55e" stroke-width="1.5"/>
        <text x="109" y="64"  text-anchor="middle" class="t">ElevenLabs</text>
        <text x="109" y="78"  text-anchor="middle" class="n">ConvAI agent (30+ langs)</text>
        <text x="109" y="91"  text-anchor="middle" class="n">Scribe v2 speech-to-text</text>
      </g>

      <g class="node" id="n-browser"
         data-title="Browser (Next.js)" data-type="blue"
         data-info="Deployed on Vercel — static + SSR|React 18 with App Router|Central entry point for all user interactions">
        <rect x="405" y="42" width="200" height="60" rx="9" fill="url(#gb)" stroke="#38bdf8" stroke-width="1.5"/>
        <text x="505" y="64"  text-anchor="middle" class="t">Browser (Next.js)</text>
        <text x="505" y="78"  text-anchor="middle" class="n">Vercel — static + SSR</text>
        <text x="505" y="91"  text-anchor="middle" class="n">React 18, App Router</text>
      </g>

      <g class="node" id="n-featherless"
         data-title="Featherless AI" data-type="green"
         data-info="Hosts Qwen/Qwen2.5-7B-Instruct model|OpenAI-compatible inference API|Called by Connect_LLM and Show_result Lambdas">
        <rect x="835" y="42" width="200" height="60" rx="9" fill="url(#gg)" stroke="#22c55e" stroke-width="1.5"/>
        <text x="935" y="64"  text-anchor="middle" class="t">Featherless AI</text>
        <text x="935" y="78"  text-anchor="middle" class="n">Qwen/Qwen2.5-7B-Instruct</text>
        <text x="935" y="91"  text-anchor="middle" class="n">OpenAI-compat inference</text>
      </g>

      <!-- ElevenLabs ↔ Browser (WebSocket) -->
      <line class="f" x1="198" y1="72" x2="405" y2="72"/>
      <text x="301" y="66" text-anchor="middle" class="n">WebSocket</text>

      <!-- ══════════════════════════════════════════
           ROW 2  y=148   Auth & Gateway
      ══════════════════════════════════════════ -->

      <g class="node" id="n-cognito"
         data-title="Amazon Cognito" data-type="purple"
         data-info="User Pool: JWT issuance for all API calls|Identity Pool: browser AWS credentials via STS|Manages sign-in, sign-up, and session lifecycle">
        <rect x="20"  y="148" width="178" height="72" rx="9" fill="url(#gp)" stroke="#7c3aed" stroke-width="1.5"/>
        <text x="109" y="170" text-anchor="middle" class="t">Amazon Cognito</text>
        <text x="109" y="184" text-anchor="middle" class="n">User Pool — JWT issuance</text>
        <text x="109" y="197" text-anchor="middle" class="n">Identity Pool — browser</text>
        <text x="109" y="210" text-anchor="middle" class="n">AWS creds via STS</text>
      </g>

      <g class="node" id="n-apigw"
         data-title="API Gateway" data-type="orange"
         data-info="HTTP entry point for all Lambda functions|Routes authenticated requests from the browser|JWT-validated via Cognito User Pool authorizer">
        <rect x="405" y="148" width="200" height="60" rx="9" fill="url(#go)" stroke="#fb923c" stroke-width="1.5"/>
        <text x="505" y="170" text-anchor="middle" class="t">API Gateway</text>
        <text x="505" y="184" text-anchor="middle" class="n">HTTP entry point</text>
        <text x="505" y="197" text-anchor="middle" class="n">for all Lambda functions</text>
      </g>

      <g class="node" id="n-iam"
         data-title="IAM" data-type="purple"
         data-info="Least-privilege roles for every Lambda|Per-Lambda scoping minimizes blast radius|Governs access to all AWS service APIs">
        <rect x="835" y="148" width="200" height="60" rx="9" fill="url(#gp)" stroke="#7c3aed" stroke-width="1.5"/>
        <text x="935" y="170" text-anchor="middle" class="t">IAM</text>
        <text x="935" y="184" text-anchor="middle" class="n">Least-privilege roles</text>
        <text x="935" y="197" text-anchor="middle" class="n">per-Lambda scoping</text>
      </g>

      <!-- Browser → Cognito (diagonal) -->
      <line class="e" x1="440" y1="102" x2="198" y2="168"/>
      <text x="302" y="128" text-anchor="middle" class="n">sign-in / JWT</text>
      <!-- Browser → API Gateway -->
      <line class="f" x1="505" y1="102" x2="505" y2="148"/>

      <!-- ══════════════════════════════════════════
           ROW 3  y=258   Triggers & Buffer
      ══════════════════════════════════════════ -->

      <g class="node" id="n-autoverify"
         data-title="autoVerify Lambda" data-type="purple"
         data-info="Cognito post-confirmation trigger|Automatically confirms user signups|Eliminates manual email verification">
        <rect x="20"  y="258" width="178" height="52" rx="9" fill="url(#gp)" stroke="#7c3aed" stroke-width="1.5"/>
        <text x="109" y="279" text-anchor="middle" class="t">autoVerify Lambda</text>
        <text x="109" y="293" text-anchor="middle" class="n">Cognito trigger — auto-confirm</text>
      </g>

      <g class="node" id="n-sqs"
         data-title="Amazon SQS" data-type="orange"
         data-info="Request buffer between API GW and Step Functions|Prevents Lambda concurrency spikes under load|Decouples request ingestion from processing">
        <rect x="405" y="258" width="200" height="55" rx="9" fill="url(#go)" stroke="#fb923c" stroke-width="1.5"/>
        <text x="505" y="280" text-anchor="middle" class="t">Amazon SQS</text>
        <text x="505" y="294" text-anchor="middle" class="n">Request buffer</text>
        <text x="505" y="307" text-anchor="middle" class="n">prevents concurrency spikes</text>
      </g>

      <!-- Cognito → autoVerify -->
      <line class="e" x1="109" y1="220" x2="109" y2="258"/>
      <!-- API GW → SQS -->
      <line class="f" x1="505" y1="208" x2="505" y2="258"/>

      <!-- ══════════════════════════════════════════
           ROW 4  y=342
           Step Functions (col2-3, wide center)
           trialsapi (col4)   Show_result (col5)
           These three are on the same row — NO overlap:
             StepFn  ends at x=548
             trialsapi starts at x=615  (67px gap)
             Show_result starts at x=835 (220px gap)
      ══════════════════════════════════════════ -->

      <g class="node" id="n-stepfn"
         data-title="AWS Step Functions" data-type="orange"
         data-info="Orchestrates the full document processing pipeline|Flow: Textract → Comprehend → LLM → Search → Result|Handles retries, error paths, and step state">
        <rect x="308" y="342" width="240" height="72" rx="9" fill="url(#go)" stroke="#fb923c" stroke-width="1.5"/>
        <text x="428" y="364" text-anchor="middle" class="t">AWS Step Functions</text>
        <text x="428" y="378" text-anchor="middle" class="n">Pipeline orchestrator</text>
        <text x="428" y="391" text-anchor="middle" class="n">Textract → Comprehend</text>
        <text x="428" y="404" text-anchor="middle" class="n">→ LLM → Search → Result</text>
      </g>

      <g class="node" id="n-trialsapi"
         data-title="trialsapi Lambda" data-type="purple"
         data-info="Patient-to-trial matching across 400k+ studies|Filters by age, sex, location, and trial phase|Scoring ranks trials by relevance + pagination|Checks ElastiCache → DynamoDB → ClinicalTrials.gov">
        <rect x="615" y="345" width="198" height="66" rx="9" fill="url(#gp)" stroke="#7c3aed" stroke-width="1.5"/>
        <text x="714" y="367" text-anchor="middle" class="t">trialsapi Lambda</text>
        <text x="714" y="381" text-anchor="middle" class="n">Patient-to-trial matching</text>
        <text x="714" y="394" text-anchor="middle" class="n">age/sex/location/phase</text>
        <text x="714" y="407" text-anchor="middle" class="n">scoring + pagination</text>
      </g>

      <g class="node" id="n-show-result"
         data-title="Show_result Lambda" data-type="purple"
         data-info="Generates personalized plain-language trial summaries|Uses Featherless AI to explain why each trial matches|Final pipeline step before results return to browser">
        <rect x="835" y="348" width="200" height="62" rx="9" fill="url(#gp)" stroke="#7c3aed" stroke-width="1.5"/>
        <text x="935" y="370" text-anchor="middle" class="t">Show_result Lambda</text>
        <text x="935" y="384" text-anchor="middle" class="n">Personalized plain-language</text>
        <text x="935" y="397" text-anchor="middle" class="n">trial recommendation</text>
      </g>

      <!-- SQS → StepFn -->
      <line class="f" x1="505" y1="313" x2="460" y2="342"/>
      <!-- StepFn → trialsapi (right, 67px gap, clean horizontal) -->
      <line class="e" x1="548" y1="372" x2="615" y2="372"/>
      <!-- StepFn → Show_result (curved arc over trialsapi — control pts above both) -->
      <path class="e" d="M 548 358 C 600 328 790 328 835 358"/>
      <!-- Show_result → Featherless (vertical, same column) -->
      <line class="f" x1="935" y1="348" x2="935" y2="102"/>

      <!-- ══════════════════════════════════════════
           ROW 5  y=452
           Textract (col1)  Connect_LLM (col2)
           ElastiCache (col4)  KMS (col5)
      ══════════════════════════════════════════ -->

      <g class="node" id="n-textract"
         data-title="AWS Textract" data-type="purple"
         data-info="Extracts text from uploaded PDFs and images|First Lambda invoked by Step Functions|Converts unstructured documents to machine-readable text">
        <rect x="20"  y="452" width="178" height="60" rx="9" fill="url(#gp)" stroke="#7c3aed" stroke-width="1.5"/>
        <text x="109" y="474" text-anchor="middle" class="t">AWS Textract</text>
        <text x="109" y="488" text-anchor="middle" class="n">Client-side PDF/image</text>
        <text x="109" y="501" text-anchor="middle" class="n">text extraction</text>
      </g>

      <g class="node" id="n-connect-llm"
         data-title="Connect_LLM Lambda" data-type="purple"
         data-info="Synthesizes medical data into a patient narrative|Sends profile to Featherless AI (Qwen2.5-7B)|Produces natural language patient summary for matching">
        <rect x="213" y="452" width="185" height="60" rx="9" fill="url(#gp)" stroke="#7c3aed" stroke-width="1.5"/>
        <text x="305" y="474" text-anchor="middle" class="t">Connect_LLM Lambda</text>
        <text x="305" y="488" text-anchor="middle" class="n">Synthesizes patient profile</text>
        <text x="305" y="501" text-anchor="middle" class="n">narrative via LLM</text>
      </g>

      <g class="node" id="n-elasticache"
         data-title="ElastiCache (Valkey)" data-type="blue"
         data-info="L1 hot cache — fastest lookup layer|1-hour TTL per query key|TLS encrypted on port 6380|Returns source: 'valkey' on cache hit">
        <rect x="615" y="452" width="198" height="72" rx="9" fill="url(#gb)" stroke="#38bdf8" stroke-width="1.5"/>
        <text x="714" y="474" text-anchor="middle" class="t">ElastiCache (Valkey)</text>
        <text x="714" y="488" text-anchor="middle" class="n">L1 hot cache, 1hr TTL</text>
        <text x="714" y="501" text-anchor="middle" class="n">TLS port 6380</text>
        <text x="714" y="514" text-anchor="middle" class="n">source: "valkey" on hit</text>
      </g>

      <g class="node" id="n-kms"
         data-title="AWS KMS" data-type="red"
         data-info="Encryption at rest for all DynamoDB tables|Customer-managed keys for HIPAA compliance|Decryption happens transparently at read time">
        <rect x="835" y="452" width="200" height="60" rx="9" fill="url(#gr)" stroke="#f87171" stroke-width="1.5"/>
        <text x="935" y="474" text-anchor="middle" class="t">AWS KMS</text>
        <text x="935" y="488" text-anchor="middle" class="n">Encryption at rest</text>
        <text x="935" y="501" text-anchor="middle" class="n">All DynamoDB tables</text>
      </g>

      <!-- StepFn → Textract (left diagonal) -->
      <line class="e" x1="308" y1="375" x2="198" y2="465"/>
      <!-- StepFn → Connect_LLM -->
      <line class="e" x1="368" y1="414" x2="305" y2="452"/>
      <!-- trialsapi → ElastiCache -->
      <line class="e" x1="714" y1="411" x2="714" y2="452"/>
      <!-- Show_result → KMS -->
      <line class="e" x1="935" y1="410" x2="935" y2="452"/>
      <!-- Connect_LLM → Featherless (right-gutter route, avoids all nodes) -->
      <path class="e" stroke-dasharray="5 3" d="M 398 462 L 1062 462 L 1062 65 L 1035 65"/>
      <text x="730" y="455" text-anchor="middle" class="n">LLM call</text>

      <!-- ══════════════════════════════════════════
           ROW 6  y=545
           Medical_parsing (col1)  pipeline-logger (col2)
           DynCache (col4)  X-Ray (col5)
      ══════════════════════════════════════════ -->

      <g class="node" id="n-med-parsing"
         data-title="Medical_parsing Lambda" data-type="purple"
         data-info="Invokes Comprehend Medical for entity extraction|Logs results to the pipeline audit trail|Bridges raw Textract output to structured medical NLP">
        <rect x="20"  y="545" width="178" height="60" rx="9" fill="url(#gp)" stroke="#7c3aed" stroke-width="1.5"/>
        <text x="109" y="567" text-anchor="middle" class="t">Medical_parsing Lambda</text>
        <text x="109" y="581" text-anchor="middle" class="n">Invokes Comprehend Medical</text>
        <text x="109" y="594" text-anchor="middle" class="n">logs to pipeline</text>
      </g>

      <g class="node" id="n-pipe-logger"
         data-title="pipeline-logger Lambda" data-type="purple"
         data-info="Writes step metadata to DynamoDB pipeline-steps|Invoked by every Lambda in the processing pipeline|Creates the full audit trail for the transparency page">
        <rect x="213" y="545" width="185" height="60" rx="9" fill="url(#gp)" stroke="#7c3aed" stroke-width="1.5"/>
        <text x="305" y="567" text-anchor="middle" class="t">pipeline-logger Lambda</text>
        <text x="305" y="581" text-anchor="middle" class="n">Writes step metadata</text>
        <text x="305" y="594" text-anchor="middle" class="n">invoked by all Lambdas</text>
      </g>

      <g class="node" id="n-dynamo-cache"
         data-title="DynamoDB — ClinicalTrialsCache" data-type="blue"
         data-info="L2 cold cache with 24-hour TTL|Falls through to ClinicalTrials.gov on miss|Backfills ElastiCache on successful hit|Dramatically reduces external API calls">
        <rect x="615" y="558" width="198" height="62" rx="9" fill="url(#gb)" stroke="#38bdf8" stroke-width="1.5"/>
        <text x="714" y="580" text-anchor="middle" class="t">DynamoDB</text>
        <text x="714" y="594" text-anchor="middle" class="n">ClinicalTrialsCache table</text>
        <text x="714" y="607" text-anchor="middle" class="n">L2 cold cache, 24hr TTL</text>

<script>
  const BADGES = {
    purple: { bg:'rgba(124,58,237,0.15)', border:'rgba(124,58,237,0.35)', text:'#c4b5fd', label:'Lambda / Core' },
    blue:   { bg:'rgba(56,189,248,0.12)', border:'rgba(56,189,248,0.35)', text:'#7dd3fc', label:'DynamoDB / Cache' },
    orange: { bg:'rgba(251,146,60,0.12)', border:'rgba(251,146,60,0.35)', text:'#fdba74', label:'Orchestration' },
    red:    { bg:'rgba(248,113,113,0.12)',border:'rgba(248,113,113,0.35)',text:'#fca5a5', label:'Observability' },
    green:  { bg:'rgba(34,197,94,0.12)',  border:'rgba(34,197,94,0.35)',  text:'#86efac', label:'External API' },
  };
  const hint   = document.getElementById('hint-default');
  const detail = document.getElementById('node-detail');
  const niTitle= document.getElementById('ni-title');
  const niBadge= document.getElementById('ni-badge');
  const niRows = document.getElementById('ni-rows');
  const niHipaa= document.getElementById('ni-hipaa');

  document.querySelectorAll('.node').forEach(node => {
    node.addEventListener('mouseenter', () => {
      const c = BADGES[node.dataset.type] || BADGES.purple;
      niBadge.textContent = c.label;
      niBadge.style.cssText = `background:${c.bg};border:1px solid ${c.border};color:${c.text};`;
      niTitle.textContent = node.dataset.title || '';
      niRows.innerHTML = (node.dataset.info || '').split('|').filter(Boolean).map(s =>
        `<div class="ni-row">
           <svg class="ni-row-icon" width="10" height="10" viewBox="0 0 10 10">
             <polygon points="0,0 10,5 0,10" fill="#7c5cbf"/>
           </svg><span>${s}</span></div>`
      ).join('');
      niHipaa.style.display = node.dataset.hipaa === 'true' ? 'block' : 'none';
      hint.style.display = 'none';
      detail.classList.add('active');
    });
    node.addEventListener('mouseleave', () => {
      detail.classList.remove('active');
      hint.style.display = '';
    });
  });
</script>
